<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khởi Sự Doanh Nghiệp - Ôn Tập Pro</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: #1e1e2e; 
            color: #cdd6f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #313244; 
            padding: 30px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 650px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            position: relative;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; color: #a6adc8; }
        .score-badge { background: #89b4fa; color: #11111b; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; }
        .question { font-size: 1.25rem; margin-bottom: 20px; line-height: 1.5; color: #f38ba8; font-weight: bold; min-height: 60px;}
        
        textarea { 
            width: 100%; 
            height: 90px; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #45475a; 
            background-color: #181825; 
            color: #cdd6f4; 
            font-size: 1rem; 
            resize: none;
            margin-bottom: 15px;
            transition: border 0.3s;
        }
        textarea:focus { outline: none; border-color: #89b4fa; }
        
        .main-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        button {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-check { flex: 2; background-color: #89b4fa; color: #11111b; }
        .btn-check:hover:not(:disabled) { background-color: #74c7ec; transform: translateY(-2px); }
        
        .btn-retry { flex: 1; background-color: #fab387; color: #11111b; display: none; }
        .btn-retry:hover { background-color: #f9e2af; transform: translateY(-2px); }

        .nav-actions { display: flex; justify-content: space-between; border-top: 1px solid #45475a; padding-top: 20px; }
        .btn-nav { background-color: #45475a; color: #cdd6f4; padding: 10px 20px; }
        .btn-nav:hover:not(:disabled) { background-color: #585b70; }
        .btn-random { background-color: #cba6f7; color: #11111b; }
        .btn-random:hover { background-color: #f5c2e7; }

        .feedback { 
            margin-bottom: 20px; 
            padding: 15px; 
            border-radius: 8px; 
            display: none; 
            animation: fadeIn 0.4s;
        }
        .feedback.correct { background-color: rgba(166, 227, 161, 0.15); border: left 4px solid #a6e3a1; }
        .feedback.wrong { background-color: rgba(243, 139, 168, 0.15); border-left: 4px solid #f38ba8; }
        .feedback h3 { margin-top: 0; margin-bottom: 8px; font-size: 1.1rem; }
        .official-ans { color: #bac2de; font-size: 0.95rem; line-height: 1.5; }

        /* Hiệu ứng */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake-effect { animation: shake 0.4s; }
        .flash-green { box-shadow: 0 0 40px rgba(166, 227, 161, 0.4); }
        .flash-red { box-shadow: 0 0 40px rgba(243, 139, 168, 0.4); }
    </style>
</head>
<body>

<div class="container" id="gameBox">
    <div class="top-bar">
        <span id="progress">Câu 1 / 20</span>
        <span class="score-badge" id="score">Điểm: 0</span>
    </div>
    
    <div class="question" id="questionText">Đang tải câu hỏi...</div>
    
    <textarea id="userInput" placeholder="Nhập câu trả lời theo ý hiểu của em..."></textarea>
    
    <div class="main-actions">
        <button class="btn-check" id="btnCheck" onclick="checkAnswer()">📝 Kiểm tra đáp án</button>
        <button class="btn-retry" id="btnRetry" onclick="retryQuestion()">🔄 Làm lại</button>
    </div>

    <div class="feedback" id="feedbackBox">
        <h3 id="feedbackStatus"></h3>
        <strong>Đáp án chuẩn:</strong>
        <div class="official-ans" id="officialAns"></div>
    </div>

    <div class="nav-actions">
        <button class="btn-nav" id="btnPrev" onclick="changeQuestion(-1)">⬅️ Lùi lại</button>
        <button class="btn-random" onclick="shuffleQuestions()">🔀 Trộn ngẫu nhiên</button>
        <button class="btn-nav" id="btnNext" onclick="changeQuestion(1)">Tiến tới ➡️</button>
    </div>
</div>

<script>
    const originalData = [
        { id: 1, q: "Đặc điểm chung mà doanh nhân thường có?", a: "Sự tự tin, Thích giao tiếp xã hội, Nhìn trước tương lai (lo xa/nhìn xa), Có định hướng hành động.", keywords: ["tự tin", "giao tiếp", "tương lai", "nhìn", "hành động"] },
        { id: 2, q: "Nêu 4 giai đoạn của vòng đời kinh doanh?", a: "Khởi động, Cạnh tranh, Tăng trưởng, Trưởng thành và suy thoái.", keywords: ["khởi động", "cạnh tranh", "tăng trưởng", "trưởng thành", "suy thoái"] },
        { id: 3, q: "Phân biệt thu nhập chủ động và thu nhập thụ động?", a: "Chủ động: tiền từ lao động trực tiếp (lương). Thụ động: tiền kiếm được không cần trực tiếp làm việc liên tục (thuê nhà, cổ tức).", keywords: ["trực", "lao động", "không", "liên tục"] },
        { id: 4, q: "Quy trình 4 bước nhận thức cơ hội kinh doanh?", a: "Nhận thức cơ hội, Khái quát hóa, Lập Kế hoạch giải quyết, Vận hành triển khai.", keywords: ["nhận thức", "khái quát", "kế hoạch", "vận hành"] },
        { id: 5, q: "Các hình thức vốn có thể huy động cho khởi nghiệp?", a: "Vốn riêng (Bootstrapping), Vốn cổ phần (Equity), Đầu tư mạo hiểm (Venture capital), Vốn vay (Loans).", keywords: ["riêng", "tự", "cổ phần", "mạo hiểm", "vay"] },
        { id: 6, q: "Các yếu tố trong Phương trình ý tưởng kinh doanh?", a: "Đối tượng + Vấn đề/lợi ích + Mô hình kinh doanh.", keywords: ["đối tượng", "vấn đề", "lợi ích", "mô hình"] },
        { id: 7, q: "5 loại đổi mới được nói đến trong bài Udemy?", a: "Giá cả, Sự tiện lợi, Tốc độ, Chất lượng, Sự thể hiện.", keywords: ["giá", "tiện", "tốc độ", "chất", "thể hiện"] },
        { id: 8, q: "Mô hình kinh doanh DTC là gì?", a: "Direct to Consumer - Bán trực tiếp đến người tiêu dùng, bỏ qua bán buôn/bán lẻ trung gian.", keywords: ["trực tiếp", "tiêu dùng", "bỏ", "trung gian"] },
        { id: 9, q: "Quy trình lập Bảng kế hoạch kinh doanh gồm mấy bước? Kể tên bước 4, 5?", a: "Gồm 13 bước. B4: Đội ngũ quản lý, B5: Sản phẩm/dịch vụ.", keywords: ["13", "quản lý", "sản phẩm", "dịch vụ"] },
        { id: 10, q: "Các loại hình pháp lý theo luật DN 2015?", a: "TNHH 1 thành viên, TNHH 2 thành viên trở lên, Cổ phần, Hợp danh, Doanh nghiệp tư nhân.", keywords: ["tnhh", "cổ phần", "hợp danh", "tư nhân"] },
        { id: 11, q: "Xây dựng lực lượng bán hàng, chọn kênh truyền thông online là bước mấy trong KHKD?", a: "Bước 9: Chiến lược/kế hoạch marketing và bán hàng.", keywords: ["9", "marketing", "bán hàng"] },
        { id: 12, q: "Các loại báo cáo cần lập trong Bước 12 (Báo cáo tài chính)?", a: "Doanh thu (REV), Kết quả kinh doanh (IS), Cân đối kế toán (BS), Lưu chuyển tiền tệ (CF).", keywords: ["doanh thu", "kết quả", "cân đối", "lưu chuyển"] },
        { id: 13, q: "Có mấy bước lập KHKD? Bước 10, 11 tên là gì?", a: "Có 13 bước. B10: Các cột mốc quan trọng, B11: Những rủi ro ảnh hưởng.", keywords: ["13", "cột", "rủi ro"] },
        { id: 14, q: "Đánh giá rủi ro công nghệ, đối thủ cạnh tranh, khắc phục sự cố là bước nào?", a: "Bước 11: Những rủi ro ảnh hưởng đến Kế hoạch kinh doanh.", keywords: ["11", "rủi ro"] },
        { id: 15, q: "Công thức tính doanh thu?", a: "Doanh thu = Số lượng sản phẩm bán ra x Giá bán.", keywords: ["số lượng", "giá"] },
        { id: 16, q: "Công thức tính lợi nhuận?", a: "Lợi nhuận = Tổng doanh thu - Tổng chi phí.", keywords: ["doanh thu", "chi phí"] },
        { id: 17, q: "Liệt kê 9 yếu tố trong Business Model Canvas?", a: "Phân khúc KH, Giá trị, Kênh phân phối, Quan hệ KH, Nguồn doanh thu, Nguồn lực, Hoạt động, Đối tác, Cấu trúc chi phí.", keywords: ["phân khúc", "giá trị", "kênh", "quan hệ", "doanh thu", "nguồn lực", "hoạt động", "đối tác", "chi phí"] },
        { id: 18, q: "Cấu trúc chi phí gồm những gì? Ví dụ?", a: "Chi phí cố định (thuê nhà xưởng) và Chi phí biến đổi (mua nguyên vật liệu).", keywords: ["cố định", "biến đổi"] },
        { id: 19, q: "Xác định nhu cầu, nhân khẩu học, chọn thị trường là yếu tố nào trong Canvas?", a: "Phân khúc khách hàng.", keywords: ["phân khúc", "khách hàng"] },
        { id: 20, q: "Sắp xếp MS, LinkedIn, Dropbox, FB, Drive, Canva vào mô hình doanh thu?", a: "Đăng ký: Microsoft, Drive, Dropbox. Freemium: LinkedIn, Canva. Quảng cáo: FB, LinkedIn.", keywords: ["đăng ký", "freemium", "quảng cáo"] }
    ];

    let questions = [...originalData];
    let currentIdx = 0;
    let solvedIds = new Set(); // Lưu ID các câu đã trả lời đúng để tính điểm
    let gameBox = document.getElementById("gameBox");

    function renderUI() {
        // Cập nhật text
        document.getElementById("progress").innerText = `Câu ${currentIdx + 1} / ${questions.length}`;
        document.getElementById("score").innerText = `Điểm: ${solvedIds.size * 10}`;
        document.getElementById("questionText").innerText = questions[currentIdx].q;
        
        // Reset trạng thái ô nhập và các nút
        document.getElementById("userInput").value = "";
        document.getElementById("userInput").disabled = false;
        document.getElementById("btnCheck").style.display = "flex";
        document.getElementById("btnRetry").style.display = "none";
        document.getElementById("feedbackBox").style.display = "none";
        gameBox.classList.remove("flash-green", "flash-red", "shake-effect");

        // Disable nút Tới/Lùi nếu ở đầu hoặc cuối
        document.getElementById("btnPrev").disabled = (currentIdx === 0);
        document.getElementById("btnNext").disabled = (currentIdx === questions.length - 1);
        
        // Cập nhật text nút "Tiến tới" thành "Hoàn thành" nếu là câu cuối
        if(currentIdx === questions.length - 1) {
            document.getElementById("btnNext").innerText = "Kết thúc 🎉";
        } else {
            document.getElementById("btnNext").innerText = "Tiến tới ➡️";
        }
    }

    function checkAnswer() {
        let userAns = document.getElementById("userInput").value.toLowerCase();
        if (userAns.trim() === "") {
            alert("Em chưa nhập đáp án kìa!");
            return;
        }

        let q = questions[currentIdx];
        let matches = 0;
        
        q.keywords.forEach(kw => {
            if (userAns.includes(kw.toLowerCase())) matches++;
        });

        // Du di: đúng >= 40% keyword là cho qua
        let threshold = Math.max(1, Math.ceil(q.keywords.length * 0.4));
        let isCorrect = matches >= threshold;

        showFeedback(isCorrect, q);
    }

    function showFeedback(isCorrect, q) {
        let fbBox = document.getElementById("feedbackBox");
        let fbStatus = document.getElementById("feedbackStatus");
        
        fbBox.style.display = "block";
        document.getElementById("officialAns").innerText = q.a;
        gameBox.classList.remove("flash-green", "flash-red", "shake-effect");
        document.getElementById("btnCheck").style.display = "none";
        document.getElementById("userInput").disabled = true;

        if (isCorrect) {
            solvedIds.add(q.id); // Thêm vào set (chỉ cộng điểm 1 lần dù có lùi lại làm lại)
            document.getElementById("score").innerText = `Điểm: ${solvedIds.size * 10}`;
            
            fbStatus.innerText = "🎉 Chính xác! Tuyệt vời!";
            fbStatus.style.color = "#a6e3a1";
            fbBox.className = "feedback correct";
            gameBox.classList.add("flash-green");
        } else {
            fbStatus.innerText = "❌ Sai hoặc thiếu ý rồi!";
            fbStatus.style.color = "#f38ba8";
            fbBox.className = "feedback wrong";
            gameBox.classList.add("flash-red", "shake-effect");
            document.getElementById("btnRetry").style.display = "flex"; // Hiện nút làm lại
            
            setTimeout(() => { gameBox.classList.remove("shake-effect"); }, 400);
        }
    }

    function retryQuestion() {
        document.getElementById("userInput").value = "";
        document.getElementById("userInput").disabled = false;
        document.getElementById("feedbackBox").style.display = "none";
        document.getElementById("btnRetry").style.display = "none";
        document.getElementById("btnCheck").style.display = "flex";
        gameBox.classList.remove("flash-red");
        document.getElementById("userInput").focus();
    }

    function changeQuestion(step) {
        let newIdx = currentIdx + step;
        if (newIdx >= 0 && newIdx < questions.length) {
            currentIdx = newIdx;
            renderUI();
        } else if (newIdx >= questions.length) {
            alert(`Chúc mừng em đã hoàn thành! Tổng điểm: ${solvedIds.size * 10}/${questions.length * 10}`);
        }
    }

    function shuffleQuestions() {
        if(confirm("Trộn câu hỏi sẽ đảo lộn thứ tự hiện tại, em có chắc không?")) {
            // Thuật toán Fisher-Yates shuffle
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
            currentIdx = 0;
            renderUI();
        }
    }

    // Khởi tạo lần đầu
    renderUI();
</script>

</body>
</html>
