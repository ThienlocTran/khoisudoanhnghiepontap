<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khởi Sự Doanh Nghiệp - Production Quiz</title>
    <style>
        /* =========================================
           🎨 UI & THEMING (MOBILE FIRST)
           ========================================= */
        :root[data-theme="dark"] {
            --bg: #11111b; --surface: #1e1e2e; --input: #313244;
            --text: #cdd6f4; --text-dim: #a6adc8;
            --primary: #89b4fa; --primary-hover: #74c7ec;
            --success: #a6e3a1; --success-bg: rgba(166, 227, 161, 0.1);
            --danger: #f38ba8; --danger-bg: rgba(243, 139, 168, 0.1);
            --border: #45475a; --highlight: rgba(249, 226, 175, 0.3);
            --highlight-text: #f9e2af;
        }
        :root[data-theme="light"] {
            --bg: #f4f5f7; --surface: #ffffff; --input: #f4f5f7;
            --text: #172b4d; --text-dim: #5e6c84;
            --primary: #0052cc; --primary-hover: #0065ff;
            --success: #00875a; --success-bg: #e3fcef;
            --danger: #de350b; --danger-bg: #ffebe6;
            --border: #dfe1e6; --highlight: #fffae6;
            --highlight-text: #ff8b00;
        }

        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        
        .app-container { background: var(--surface); width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; position: relative; padding-bottom: 80px; overflow: hidden; }
        
        /* Layouts */
        .p-4 { padding: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { gap: 10px; } .gap-3 { gap: 15px; }

        /* Loading & Error Screens */
        #loading-screen, #error-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 300px; text-align: center; }
        #error-screen { display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Stats & Header */
        .header { border-bottom: 1px solid var(--border); }
        .badge { background: var(--border); padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; display: inline-block; transition: background 0.4s, color 0.4s; }
        .badge-success { background: var(--success); color: #000; }
        /* Mastery Badge levels */
        .mastery-0 { background: var(--border); color: var(--text-dim); }
        .mastery-1 { background: var(--primary); color: #000; }
        .mastery-2 { background: #fab387; color: #1e1e2e; }
        .mastery-3 { background: #f38ba8; color: #1e1e2e; }
        .mastery-4 { background: #f9e2af; color: #1e1e2e; }
        /* Hint button */
        .btn-hint { background: rgba(249,226,175,0.15); color: var(--highlight-text); border: 1px solid var(--highlight-text); border-radius: 6px; padding: 6px 12px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-top: 8px; display: none; }
        .btn-hint:hover { background: rgba(249,226,175,0.25); }
        .setting-label { font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
        
        /* Typography */
        .question-text { font-size: 1.2rem; font-weight: 600; color: var(--primary); line-height: 1.5; margin-bottom: 15px; }
        .sub-text { font-size: 0.9rem; color: var(--text-dim); }

        /* Inputs & Feedback */
        textarea { width: 100%; min-height: 120px; padding: 15px; border-radius: 8px; border: 2px solid var(--border); background: var(--input); color: var(--text); font-size: 1rem; resize: none; transition: border-color 0.2s; }
        textarea:focus { outline: none; border-color: var(--primary); }
        textarea:disabled { opacity: 0.6; }
        
        .feedback { display: none; padding: 20px; border-radius: 8px; margin-top: 15px; border-left: 4px solid transparent; }
        .feedback.show { display: block; animation: slideIn 0.3s ease; }
        .feedback.correct { background: var(--success-bg); border-color: var(--success); }
        .feedback.wrong { background: var(--danger-bg); border-color: var(--danger); }
        
        .idea-list { margin-top: 10px; padding-left: 20px; line-height: 1.6; }
        .idea-pass { color: var(--success); }
        .idea-fail { color: var(--danger); }

        .official-ans { margin-top: 15px; padding: 15px; background: var(--input); border-radius: 8px; white-space: pre-line; font-size: 0.95rem; line-height: 1.6; }
        
        /* Highlight XSS safe */
        .highlight-phrase { background: var(--highlight); color: var(--highlight-text); border-radius: 4px; padding: 0 4px; font-weight: 600; }

        /* Action Bar */
        .action-bar { position: absolute; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 15px 20px; display: flex; gap: 10px; z-index: 10; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; color: #fff; transition: opacity 0.2s, transform 0.1s; display: flex; justify-content: center; align-items: center;}
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        button:active:not(:disabled) { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: #000; flex: 2; }
        .btn-nav { background: var(--border); color: var(--text); }

        #toast { position: fixed; bottom: 90px; right: 20px; background: var(--input); border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 8px; transform: translateX(120%); transition: transform 0.3s; z-index: 1000; font-size: 0.9rem; font-weight: 500; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #toast.show { transform: translateX(0); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div id="loading-screen">
        <div class="spinner"></div>
        <p class="sub-text">Đang tải cấu trúc đề kiểm tra...</p>
    </div>

    <div id="error-screen">
        <h2>⚠️ Lỗi kết nối dữ liệu</h2>
        <p class="sub-text" style="margin: 10px 0;">Không thể tải file questions.json</p>
        <button class="btn-primary" onclick="location.reload()" style="max-width: 200px; margin: 0 auto;">Thử lại</button>
    </div>

    <div id="main-screen" style="display: none;">
        <div class="header p-4 flex-between">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <span class="badge" id="ui-progress">Câu: 0/0</span>
                <span class="badge mastery-0" id="ui-accuracy">🌱 0%</span>
            </div>
            <div class="flex-between gap-3">
                <label class="setting-label" title="Bật: Phải nộp bài (đúng/sai đều được) mới qua câu."><input type="checkbox" id="ui-strict-mode"> Strict Mode</label>
                <button class="btn-nav" id="btn-weak" style="padding: 6px 10px; flex: 0;" title="Ôn lại câu yếu">🎯</button>
                <button class="btn-nav" id="btn-shuffle" style="padding: 6px 10px; flex: 0;" title="Xáo trộn câu hỏi">🔀</button>
                <button class="btn-nav" id="btn-theme" style="padding: 6px 10px; flex: 0;" title="Đổi nền">🌓</button>
            </div>
        </div>

        <div class="p-4" style="overflow-y: auto; max-height: calc(100vh - 180px);">
            <div class="question-text" id="ui-question">Đang nạp câu hỏi...</div>
            <textarea id="ui-input" placeholder="Nhập đáp án (Nhấn Enter để nộp bài)..."></textarea>
            <button class="btn-hint" id="btn-hint">💡 Gợi ý</button>
            
            <div class="feedback" id="ui-feedback">
                <h3 id="ui-score-title">Kết quả</h3>
                <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px;">
                    <div style="flex: 1; min-width: 200px;">
                        <strong>Phân tích từ khóa:</strong>
                        <ul class="idea-list" id="ui-idea-list"></ul>
                    </div>
                </div>
                <div class="official-ans" id="ui-official"></div>
                <button class="btn-nav" style="margin-top: 15px; padding: 8px; font-size: 0.9rem; max-width: 150px;" onclick="AnalyticsService.exportData()">📥 Export Analytics</button>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn-nav" id="btn-prev">⬅️</button>
            <button class="btn-primary" id="btn-submit">Nộp bài</button>
            <button class="btn-nav" id="btn-next">➡️</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
/**
 * ==========================================
 * 1. CONFIG & UTILITIES
 * ==========================================
 */
// Lọc các từ vô nghĩa tiếng Việt để tránh false positive (Ví dụ: "là", "và", "những"...)
const STOP_WORDS = new Set([
    "la", "va", "co", "thi", "ma", "cua", "cac", "nhung", "duoc", "bi", "ra", "vao", "cho", "de", "tu"
]);

const Utils = {
    // Escape HTML chống XSS cực mạnh
    escapeHTML: (str) => {
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    },
    // Chuẩn hóa chuỗi: Bỏ dấu tiếng Việt, đưa về chữ thường
    normalize: (text) => {
        if (!text) return "";
        return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                   .replace(/đ/g, "d").replace(/Đ/g, "d")
                   .toLowerCase().replace(/[^\w\s]/gi, ' ').trim();
    },
    // Tách từ và loại bỏ Stop-words
    tokenize: (text) => {
        const clean = Utils.normalize(text);
        return clean.split(/\s+/).filter(t => t && !STOP_WORDS.has(t));
    },
    // Fisher-Yates shuffle (không mutate array gốc)
    shuffle: (array) => {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
};

/**
 * ==========================================
 * 2. STORAGE, STATE & ANALYTICS
 * ==========================================
 */
const StorageService = {
    VERSION: 4,
    KEY: "quiz_pro_v4",
    save: (state) => {
        const payload = {
            version: StorageService.VERSION,
            data: {
                currentIndex: state.currentIndex,
                solvedIds: Array.from(state.solvedIds),
                answeredIds: Array.from(state.answeredIds),
                analytics: state.analytics,
                strictMode: state.strictMode,
                theme: state.theme,
                // Persist thứ tự câu để reload không đảo lại
                questionOrder: state.activeQuestions.map(q => q.id)
            }
        };
        localStorage.setItem(StorageService.KEY, JSON.stringify(payload));
    },
    load: () => {
        try {
            const raw = localStorage.getItem(StorageService.KEY);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (parsed.version !== StorageService.VERSION) {
                console.warn("[Storage] Version mismatch. Schema migration needed or resetting.");
                localStorage.removeItem(StorageService.KEY);
                return null;
            }
            return parsed.data;
        } catch(e) { return null; }
    }
};

const AppState = {
    questions: [],
    activeQuestions: [],
    currentIndex: 0,
    solvedIds: new Set(),
    answeredIds: new Set(), // Track ID đã submit (để gỡ block strict mode)
    isSubmitting: false,
    strictMode: true,
    theme: 'dark',
    analytics: { wrongClusters: {} } // Cấu trúc: { "Q1_ClusterName": 5 }
};

const AnalyticsService = {
    recordMissedClusters: (qId, failedClusters) => {
        failedClusters.forEach(clusterName => {
            const key = `Q${qId}_${clusterName}`;
            AppState.analytics.wrongClusters[key] = (AppState.analytics.wrongClusters[key] || 0) + 1;
        });
    },
    exportData: () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(AppState.analytics, null, 2));
        const a = document.createElement('a');
        a.href = dataStr;
        a.download = `quiz_analytics_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }
};

/**
 * ==========================================
 * 2b. SHUFFLE CONTROLLER
 * ==========================================
 */
const ShuffleController = {
    // Mode 2: Giữ điểm đúng (solvedIds), reset trạng thái nộp bài (answeredIds)
    // → Phù hợp nhất cho ôn tập: biết câu nào đã thuộc, không cần làm lại
    shuffleAll: () => {
        if (!confirm("Bạn muốn xáo trộn lại toàn bộ câu hỏi?\n(Tiến trình câu hiện tại sẽ reset, điểm đúng vẫn được giữ)")) return;

        AppState.currentIndex = 0;
        AppState.answeredIds.clear();           // Reset trạng thái nộp bài
        // AppState.solvedIds KHÔNG clear → giữ badge "Đúng: X/20"

        AppState.activeQuestions = Utils.shuffle(AppState.questions);
        StorageService.save(AppState);          // Lock in thứ tự mới ngay lập tức

        UIController.showToast("🔀 Đã xáo trộn câu hỏi!");
        UIController.renderQuestion();
    },

    // Bonus: chỉ shuffle câu chưa đúng (Adaptive mode)
    shuffleWeak: () => {
        const unsolved = AppState.questions.filter(q => !AppState.solvedIds.has(q.id));
        if (unsolved.length === 0) {
            UIController.showToast("🎉 Bạn đã làm đúng tất cả câu!");
            return;
        }
        if (!confirm(`Chỉ luyện ${unsolved.length} câu chưa thuộc?`)) return;

        AppState.currentIndex = 0;
        AppState.answeredIds.clear();
        AppState.activeQuestions = Utils.shuffle(unsolved);
        StorageService.save(AppState);

        UIController.showToast(`🎯 Luyện ${unsolved.length} câu yếu!`);
        UIController.renderQuestion();
    }
};

/**
 * ==========================================
 * 3. CORE VALIDATOR LAYER
 * ==========================================
 */
const Validator = {
    // Tiền xử lý dữ liệu lúc Fetch (Cải thiện performance)
    preprocessQuestions: (rawQuestions) => {
        return rawQuestions.map(q => {
            const processedClusters = (q.clusters || []).map(synonymsArray => {
                const phrases = synonymsArray.map(phrase => ({
                    original: phrase,
                    tokens: Utils.tokenize(phrase)
                }));
                return { label: synonymsArray[0], phrases }; // Nhãn gốc để hiển thị
            });
            return { ...q, processedClusters, totalClusters: processedClusters.length };
        });
    },

    evaluate: (input, question) => {
        const inputTokens = Utils.tokenize(input);
        const inputSet = new Set(inputTokens);
        
        const passedClusters = [];
        const failedClusters = [];
        let matchedOriginalWords = new Set(); 

        question.processedClusters.forEach(cluster => {
            let bestCoverage = 0;
            let matchedTokensForBest = [];

            // Tìm Synonym có độ phủ token cao nhất
            cluster.phrases.forEach(phrase => {
                if(phrase.tokens.length === 0) return;
                
                const matchedTokens = phrase.tokens.filter(t => inputSet.has(t));
                const coverage = matchedTokens.length / phrase.tokens.length;
                
                if (coverage > bestCoverage) {
                    bestCoverage = coverage;
                    matchedTokensForBest = matchedTokens;
                }
            });

            // Ngưỡng >= 60% token của 1 cụm mới tính là Pass
            if (bestCoverage >= 0.6) {
                passedClusters.push(cluster.label);
                matchedTokensForBest.forEach(t => matchedOriginalWords.add(t));
            } else {
                failedClusters.push(cluster.label);
            }
        });

        const threshold = question.requiredMatches || Math.ceil(question.totalClusters * 0.7);
        const isCorrect = passedClusters.length >= threshold;

        return { isCorrect, passedClusters, failedClusters, matchedOriginalWords };
    },

    // Highlight chống XSS và fix lỗi cắt partial word (Ví dụ: "canh" ko highlight trong "canh tranh")
    safeHighlight: (rawInput, matchedTokensSet) => {
        const safeInput = Utils.escapeHTML(rawInput);
        
        // Tách câu thành mảng từ (giữ nguyên khoảng trắng và ký tự đặc biệt)
        // Regex bóc tách chữ và non-chữ để bọc đúng word
        const parts = safeInput.split(/([\s.,;!?]+)/);
        
        const highlighted = parts.map(part => {
            const normalizedPart = Utils.normalize(part);
            if (matchedTokensSet.has(normalizedPart)) {
                return `<span class="highlight-phrase">${part}</span>`;
            }
            return part;
        }).join('');
        
        return highlighted;
    }
};

/**
 * ==========================================
 * 4. CONTROLLERS
 * ==========================================
 */
const NavController = {
    navigate: (step) => {
        const next = AppState.currentIndex + step;
        if (next >= 0 && next < AppState.activeQuestions.length) {
            AppState.currentIndex = next;
            StorageService.save(AppState);
            UIController.renderQuestion();
        }
    },
    
    // Strict mode chỉ khóa nếu câu này CHƯA được answered (nộp bài)
    isNextLocked: () => {
        if (!AppState.strictMode) return false;
        const qObj = AppState.activeQuestions[AppState.currentIndex];
        return !AppState.answeredIds.has(qObj.id);
    }
};

const QuizController = {
    submit: () => {
        const DOM = UIController.DOM;
        if (DOM.btnSubmit.disabled || AppState.isSubmitting) return;

        const inputStr = DOM.input.value.trim();
        if (!inputStr) {
            UIController.showToast("⚠️ Em chưa nhập nội dung!");
            return;
        }
        
        AppState.isSubmitting = true;
        const qObj = AppState.activeQuestions[AppState.currentIndex];
        const result = Validator.evaluate(inputStr, qObj);

        // Update State
        AppState.answeredIds.add(qObj.id);
        if (result.isCorrect) {
            AppState.solvedIds.add(qObj.id);
        } else {
            AnalyticsService.recordMissedClusters(qObj.id, result.failedClusters);
            // Toast nhanh: báo ngay số ý còn thiếu
            UIController.showToast(`❌ Thiếu ${result.failedClusters.length} ý — bấm 💡 để gợi ý`);
        }
        StorageService.save(AppState);

        // Render kết quả + cấp hint cho câu sai
        HintService.reset(result);
        UIController.renderFeedback(result, qObj, inputStr);
        UIController.updateStats();
        
        AppState.isSubmitting = false;
    }
};

/**
 * ==========================================
 * 4b. HINT SERVICE
 * ==========================================
 */
const HintService = {
    _level: 0,          // 0 = chưa hint, 1 = tên cluster, 2 = keyword
    _result: null,

    reset: (result) => {
        HintService._level = 0;
        HintService._result = result;
        // Chỉ hiện nút khi có câu sai
        const btn = document.getElementById('btn-hint');
        if (btn) btn.style.display = result.isCorrect ? 'none' : 'inline-block';
    },

    // Gọi khi user bấm nút Gợi ý — escalate qua 2 level
    giveHint: () => {
        const r = HintService._result;
        if (!r || r.isCorrect) return;
        HintService._level++;

        if (HintService._level === 1) {
            // Level 1: chỉ nói tên cluster bị thiếu
            const names = r.failedClusters.map(c => `"${c}"`).join(', ');
            UIController.showToast(`💡 Gợi ý: Thiếu chủ đề → ${names}`);
        } else if (HintService._level === 2) {
            // Level 2: lấy token đầu tiên của cluster bị thiếu làm keyword
            const keywords = r.failedClusters
                .map(label => {
                    // Tìm lại cluster object từ câu hiện tại
                    const qObj = AppState.activeQuestions[AppState.currentIndex];
                    const cluster = qObj.processedClusters.find(c => c.label === label);
                    return cluster ? cluster.phrases[0].tokens.slice(0, 2).join(' ') : label;
                })
                .filter(Boolean)
                .join(' | ');
            UIController.showToast(`🔑 Keyword: ${keywords}`);
        } else {
            // Đã hint hết 2 level → nhắc xem đáp án chuẩn bên dưới
            UIController.showToast('📖 Xem đáp án chuẩn tham khảo bên dưới nhé!');
        }
    }
};

/**
 * ==========================================
 * 5. UI & DOM MANIPULATION
 * ==========================================
 */
const UIController = {
    DOM: {
        loading: document.getElementById('loading-screen'),
        error: document.getElementById('error-screen'),
        main: document.getElementById('main-screen'),
        progress: document.getElementById('ui-progress'),
        accuracy: document.getElementById('ui-accuracy'),
        question: document.getElementById('ui-question'),
        input: document.getElementById('ui-input'),
        btnNext: document.getElementById('btn-next'),
        btnPrev: document.getElementById('btn-prev'),
        btnSubmit: document.getElementById('btn-submit'),
        btnWeak: document.getElementById('btn-weak'),
        btnHint: document.getElementById('btn-hint'),
        feedback: document.getElementById('ui-feedback'),
        strictMode: document.getElementById('ui-strict-mode'),
        toast: document.getElementById('toast')
    },

    showToast: (msg) => {
        UIController.DOM.toast.innerText = msg;
        UIController.DOM.toast.classList.add("show");
        setTimeout(() => UIController.DOM.toast.classList.remove("show"), 2500);
    },

    initEvents: () => {
        const DOM = UIController.DOM;
        DOM.btnSubmit.addEventListener('click', QuizController.submit);
        DOM.btnPrev.addEventListener('click', () => NavController.navigate(-1));
        DOM.btnNext.addEventListener('click', () => NavController.navigate(1));
        
        DOM.input.addEventListener('keydown', (e) => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); QuizController.submit(); }
        });

        DOM.strictMode.addEventListener('change', (e) => {
            AppState.strictMode = e.target.checked;
            StorageService.save(AppState);
            DOM.btnNext.disabled = NavController.isNextLocked();
        });

        document.getElementById('btn-weak').addEventListener('click', () => {
            ShuffleController.shuffleWeak();
        });

        document.getElementById('btn-shuffle').addEventListener('click', () => {
            ShuffleController.shuffleAll();
        });

        document.getElementById('btn-hint').addEventListener('click', () => {
            HintService.giveHint();
        });

        document.getElementById('btn-theme').addEventListener('click', () => {
            AppState.theme = AppState.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', AppState.theme);
            StorageService.save(AppState);
        });
    },

    updateStats: () => {
        const total = AppState.activeQuestions.length;
        const current = total ? AppState.currentIndex + 1 : 0;
        UIController.DOM.progress.innerText = `Câu: ${current}/${total}`;

        // Mastery Badge — 5 cấp độ theo % làm đúng trên toàn bộ đề
        const totalQ = AppState.questions.length;
        const pct = totalQ ? Math.round(AppState.solvedIds.size / totalQ * 100) : 0;
        const levels = [
            { min: 0,  cls: 'mastery-0', label: '🌱 Nhập môn' },
            { min: 30, cls: 'mastery-1', label: '📖 Cơ bản'  },
            { min: 60, cls: 'mastery-2', label: '⚡ Nâng cao' },
            { min: 85, cls: 'mastery-3', label: '🔥 Thành thạo' },
            { min: 100,cls: 'mastery-4', label: '👑 Bậc thầy' }
        ];
        const tier = [...levels].reverse().find(l => pct >= l.min) || levels[0];
        const badge = UIController.DOM.accuracy;
        badge.className = `badge ${tier.cls}`;
        badge.innerText = `${tier.label} ${pct}%`;

        // Nút Câu yếu: disable nếu đã làm đúng hết
        UIController.DOM.btnWeak.disabled = AppState.solvedIds.size === totalQ;
    },

    renderQuestion: () => {
        const DOM = UIController.DOM;
        DOM.feedback.classList.remove('show');
        
        const qObj = AppState.activeQuestions[AppState.currentIndex];
        DOM.question.innerText = qObj.question;
        DOM.input.value = "";
        DOM.input.disabled = false;
        DOM.btnSubmit.disabled = false;
        
        // Reset hint khi chuyển câu
        DOM.btnHint.style.display = 'none';
        HintService._level = 0;
        HintService._result = null;

        DOM.btnPrev.disabled = AppState.currentIndex === 0;
        DOM.btnNext.disabled = NavController.isNextLocked();
        
        UIController.updateStats();
        setTimeout(() => DOM.input.focus(), 50);
    },

    renderFeedback: (result, qObj, rawInput) => {
        const DOM = UIController.DOM;
        DOM.feedback.className = `feedback show ${result.isCorrect ? 'correct' : 'wrong'}`;
        
        const pct = Math.round((result.passedClusters.length / qObj.totalClusters) * 100);
        document.getElementById('ui-score-title').innerText = result.isCorrect 
            ? `✅ Đạt yêu cầu (${pct}%)` : `❌ Chưa đủ ý (${pct}%)`;

        let listHTML = "";
        result.passedClusters.forEach(c => listHTML += `<li class="idea-pass">✔ ${Utils.escapeHTML(c)}</li>`);
        result.failedClusters.forEach(c => listHTML += `<li class="idea-fail">✖ ${Utils.escapeHTML(c)}</li>`);
        document.getElementById('ui-idea-list').innerHTML = listHTML;

        // Render Highlighted Output
        const highlightedSafeOutput = Validator.safeHighlight(rawInput, result.matchedOriginalWords);
        
        document.getElementById('ui-official').innerHTML = `
            <div style="margin-bottom: 15px; color: var(--text-dim); font-size: 0.9rem;">
                <em>Input của bạn (Đã nhận diện token):</em><br>
                <div style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 6px; margin-top: 5px;">${highlightedSafeOutput}</div>
            </div>
            <strong>Đáp án chuẩn tham khảo:</strong><br>
            ${Utils.escapeHTML(qObj.answer)}
        `;
        
        DOM.input.disabled = true;
        DOM.btnSubmit.disabled = true;
        DOM.btnNext.disabled = AppState.currentIndex === AppState.activeQuestions.length - 1;
        // Hint button: chỉ hiện khi sai (HintService.reset() đã xử lý, sync lại ở đây)
        DOM.btnHint.style.display = result.isCorrect ? 'none' : 'inline-block';
        
        setTimeout(() => DOM.feedback.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }
};

/**
 * ==========================================
 * 6. BOOTSTRAP APP
 * ==========================================
 */
const App = {
    syncStateWithData: () => {
        // Lọc bỏ những ID thừa (nếu JSON thay đổi data)
        const validIds = new Set(AppState.questions.map(q => q.id));
        AppState.solvedIds = new Set([...AppState.solvedIds].filter(id => validIds.has(id)));
        AppState.answeredIds = new Set([...AppState.answeredIds].filter(id => validIds.has(id)));
        
        if (AppState.currentIndex >= AppState.activeQuestions.length) {
            AppState.currentIndex = 0;
        }
    },

    start: async () => {
        try {
            // Path tuyệt đối /questions.json chuẩn cho Vercel deploy
            const res = await fetch('/questions.json');
            if (!res.ok) throw new Error("HTTP " + res.status);
            const rawData = await res.json();
            
            AppState.questions = Validator.preprocessQuestions(rawData);

            // Hydrate Storage
            const savedState = StorageService.load();
            if (savedState) {
                AppState.currentIndex = savedState.currentIndex;
                AppState.solvedIds = new Set(savedState.solvedIds || []);
                AppState.answeredIds = new Set(savedState.answeredIds || []);
                AppState.analytics = savedState.analytics || { wrongClusters: {} };
                AppState.strictMode = savedState.strictMode;
                AppState.theme = savedState.theme || 'dark';

                // Khôi phục đúng thứ tự câu đã shuffle từ session trước
                if (savedState.questionOrder && savedState.questionOrder.length > 0) {
                    const map = new Map(AppState.questions.map(q => [q.id, q]));
                    const restored = savedState.questionOrder.map(id => map.get(id)).filter(Boolean);
                    // Nếu số câu khớp → dùng lại; nếu JSON đổi → shuffle mới
                    AppState.activeQuestions = restored.length === AppState.questions.length
                        ? restored
                        : Utils.shuffle(AppState.questions);
                } else {
                    AppState.activeQuestions = Utils.shuffle(AppState.questions);
                }
            } else {
                // Session mới: shuffle lần đầu
                AppState.activeQuestions = Utils.shuffle(AppState.questions);
            }

            App.syncStateWithData();
            // Lock in thứ tự ngay sau khi xác định để mọi save sau đều persist đúng
            StorageService.save(AppState);

            // UI Init
            UIController.DOM.loading.style.display = 'none';
            UIController.DOM.main.style.display = 'block';
            UIController.DOM.strictMode.checked = AppState.strictMode;
            document.documentElement.setAttribute('data-theme', AppState.theme);

            UIController.initEvents();
            UIController.renderQuestion();
        } catch (error) {
            console.error("[Boot Error]", error);
            UIController.DOM.loading.style.display = 'none';
            UIController.DOM.error.style.display = 'flex';
        }
    }
};

document.addEventListener("DOMContentLoaded", App.start);

</script>
